{% set name = "azure-keyvault-certificates" %}
{% set version = "4.7.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.zip
  sha256: 9e47d9a74825e502b13d5481c99c182040c4f54723f43371e00859436dfcf3ca

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation -vv
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - python
    - wheel
    - setuptools
  run:
    - python
    - azure-common >=1.1,<2
    - azure-core >=1.24.0,<2.0.0
    - isodate>=0.6.1
    - typing-extensions>=4.0.1

test:
  imports:
    - azure.keyvault.certificates
    - azure.keyvault.certificates.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://docs.microsoft.com/en-au/azure/key-vault
  summary: Azure Key Vault Certificates client library for Python
  license: MIT
  license_family: MIT
  license_file: LICENSE.txt
  description: Azure Key Vault Certificates client library for Python
  doc_url: https://azuresdkdocs.blob.core.windows.net/$web/python/azure-keyvault-certificates/latest/azure.keyvault.certificates.html
  dev_url: https://github.com/Azure/azure-sdk-for-python/tree/master/sdk/keyvault/azure-keyvault-certificates

extra:
  recipe-maintainers:
    - dhirschfeld
